<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad Farhan - Liquid Reveal Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #030712;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #f3f4f6;
    }

    /* Hero Container */
    .hero-container {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    /* Main Render Canvas */
    #heroCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 10;
    }

    /* Reduced Motion Fallback Static Layer */
    .reduced-motion-fallback {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 5;
    }

    /* Overlay Content & Glass UI */
    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem;
      background: radial-gradient(circle at center, transparent 40%, rgba(3, 7, 18, 0.65) 100%),
                  linear-gradient(to top, rgba(3, 7, 18, 0.9) 0%, transparent 40%);
    }

    /* Top Bar Header */
    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .brand-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }
    .status-badge {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 1.1rem;
      border-radius: 9999px;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(192, 132, 252, 0.25);
      font-size: 0.75rem;
      font-weight: 600;
      color: #e9d5ff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #a855f7;
      box-shadow: 0 0 10px #c084fc;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
    }

    /* Hero Text Content */
    .hero-content {
      max-width: 720px;
      margin-bottom: 1.5rem;
    }
    .hero-tag {
      display: inline-block;
      font-mono: monospace;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #c084fc;
      margin-bottom: 0.75rem;
    }
    .hero-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 6.5vw, 5.2rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 10px 30px rgba(0,0,0,0.6);
      margin-bottom: 1rem;
    }
    .hero-title span {
      background: linear-gradient(135deg, #c084fc 0%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-subline {
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      color: #cbd5e1;
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 1.75rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .interaction-hint {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: monospace;
      font-size: 0.825rem;
      color: #94a3b8;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.65rem 1.25rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .hint-icon {
      width: 18px;
      height: 18px;
      color: #c084fc;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Accessibility reduced motion */
    @media (prefers-reduced-motion: reduce) {
      #heroCanvas { display: none !important; }
      .reduced-motion-fallback { display: block !important; }
      .pulse-dot { animation: none; }
      .hint-icon { animation: none; }
    }

    @media (max-width: 640px) {
      .hero-overlay { padding: 1.5rem; }
      .status-badge { padding: 0.4rem 0.8rem; font-size: 0.68rem; }
    }
  </style>
</head>
<body>

  <div class="hero-container" id="heroContainer">
    <!-- Reduced Motion Fallback Image -->
    <img src="./public/images/base.jpg" alt="Ahmad Farhan Portrait" class="reduced-motion-fallback" />

    <!-- Main Fluid Liquid Reveal Canvas -->
    <canvas id="heroCanvas"></canvas>

    <!-- Overlay Headline & Content -->
    <div class="hero-overlay">
      <div class="hero-header">
        <div class="brand-logo">FARHAN</div>
        <div class="status-badge">
          <span class="pulse-dot"></span>
          <span>Interactive AI Hero</span>
        </div>
      </div>

      <div class="hero-content">
        <div class="hero-tag">NLP & Machine Learning Specialist</div>
        <h1 class="hero-title">
          AHMAD <span>FARHAN</span>
        </h1>
        <p class="hero-subline">
          Merancang Ekosistem Kecerdasan Buatan & Pemodelan Prediktif Tingkat Lanjut dengan Sentuhan Visual Modern.
        </p>
        <div class="interaction-hint">
          <svg class="hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span>Gerakkan kursor / sentuh layar untuk mengungkap efek liquid chrome</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // 1. Accessibility Reduced Motion Check
      const mediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (mediaQuery.matches) return;

      const container = document.getElementById('heroContainer');
      const canvas = document.getElementById('heroCanvas');
      const ctx = canvas.getContext('2d');

      // 2. Offscreen Canvases for Fluid Masking & Chromatic Fringe
      const maskCanvas = document.createElement('canvas');
      const maskCtx = maskCanvas.getContext('2d');

      const bottomCanvas = document.createElement('canvas');
      const bottomCtx = bottomCanvas.getContext('2d');

      const topCanvas = document.createElement('canvas');
      const topCtx = topCanvas.getContext('2d');

      // 3. Load Images: base.jpg (Top layer) and chrome.jpg (Underneath layer)
      let imagesLoaded = 0;
      const baseImg = new Image();
      const chromeImg = new Image();

      baseImg.onload = onImgLoad;
      chromeImg.onload = onImgLoad;

      baseImg.src = './public/images/base.png';
      chromeImg.src = './public/images/chrome.png';

      function onImgLoad() {
        imagesLoaded++;
        if (imagesLoaded === 2) {
          initCanvas();
          requestAnimationFrame(renderLoop);
        }
      }

      // 4. State & Particle Array for Fluid Trail
      let width = 0;
      let height = 0;
      const particles = [];
      let lastPointerTime = Date.now();
      let pointerX = 0;
      let pointerY = 0;
      let prevPointerX = 0;
      let prevPointerY = 0;
      let isInteracting = false;
      let autoAngle = 0;

      function resize() {
        width = canvas.width = maskCanvas.width = bottomCanvas.width = topCanvas.width = window.innerWidth;
        height = canvas.height = maskCanvas.height = bottomCanvas.height = topCanvas.height = window.innerHeight;
      }

      function initCanvas() {
        resize();
        window.addEventListener('resize', resize);

        pointerX = width / 2;
        pointerY = height / 2;
        prevPointerX = pointerX;
        prevPointerY = pointerY;

        // Pointer event listeners (pointermove for mouse + touch support)
        container.addEventListener('pointermove', onPointerMove);
        container.addEventListener('pointerdown', onPointerDown);
        container.addEventListener('pointerleave', onPointerLeave);
      }

      function onPointerMove(e) {
        isInteracting = true;
        lastPointerTime = Date.now();
        const rect = container.getBoundingClientRect();
        pointerX = e.clientX - rect.left;
        pointerY = e.clientY - rect.top;

        addParticle(pointerX, pointerY, pointerX - prevPointerX, pointerY - prevPointerY);

        prevPointerX = pointerX;
        prevPointerY = pointerY;
      }

      function onPointerDown(e) {
        onPointerMove(e);
        // Create burst of liquid ripples
        for (let i = 0; i < 8; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 6 + 2;
          addParticle(
            pointerX,
            pointerY,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            Math.random() * 40 + 50
          );
        }
      }

      function onPointerLeave() {
        isInteracting = false;
      }

      function addParticle(x, y, vx, vy, customRadius) {
        const speed = Math.hypot(vx, vy);
        const radius = customRadius || Math.min(Math.max(speed * 3.5, 45), 140);

        particles.push({
          x: x,
          y: y,
          vx: vx * 0.15 + (Math.random() - 0.5) * 0.5,
          vy: vy * 0.15 + (Math.random() - 0.5) * 0.5,
          radius: radius,
          maxRadius: radius * 1.3,
          alpha: 1.0,
          decay: Math.random() * 0.015 + 0.018 // Fades over ~1 second
        });
      }

      // Helper function to draw image centered with object-fit: cover
      function drawImageCover(targetCtx, img) {
        if (!img.complete || img.naturalWidth === 0) return;
        const imgRatio = img.naturalWidth / img.naturalHeight;
        const screenRatio = width / height;
        let drawWidth, drawHeight, offsetX, offsetY;

        if (screenRatio > imgRatio) {
          drawWidth = width;
          drawHeight = width / imgRatio;
          offsetX = 0;
          offsetY = (height - drawHeight) / 2;
        } else {
          drawWidth = height * imgRatio;
          drawHeight = height;
          offsetX = (width - drawWidth) / 2;
          offsetY = 0;
        }

        targetCtx.clearRect(0, 0, width, height);
        targetCtx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
      }

      // 5. Main Render Loop
      function renderLoop() {
        const now = Date.now();

        // Idle Drift Mode (when no user interaction for > 1.2s)
        if (now - lastPointerTime > 1200) {
          autoAngle += 0.02;
          const autoX = width * 0.5 + Math.sin(autoAngle) * (width * 0.25);
          const autoY = height * 0.45 + Math.cos(autoAngle * 0.7) * (height * 0.2);
          
          addParticle(autoX, autoY, Math.sin(autoAngle) * 2, Math.cos(autoAngle * 0.7) * 2, 85);
        }

        // Draw Base Image & Chrome Image onto their respective offscreen canvases
        drawImageCover(topCtx, baseImg);
        drawImageCover(bottomCtx, chromeImg);

        // Clear Mask Canvas
        maskCtx.clearRect(0, 0, width, height);
        maskCtx.fillStyle = 'rgba(0, 0, 0, 1)';
        maskCtx.fillRect(0, 0, width, height);

        // Update & Render Liquid Particles onto Mask Canvas
        maskCtx.globalCompositeOperation = 'destination-out';

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.radius += (p.maxRadius - p.radius) * 0.05;
          p.alpha -= p.decay;

          if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
          }

          // Soft Liquid Radial Gradient (Valid stop percentages in gradient)
          const grad = maskCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
          grad.addColorStop(0, `rgba(0, 0, 0, ${p.alpha})`);
          grad.addColorStop(0.5, `rgba(0, 0, 0, ${p.alpha * 0.7})`);
          grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

          maskCtx.fillStyle = grad;
          maskCtx.beginPath();
          maskCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          maskCtx.fill();
        }

        maskCtx.globalCompositeOperation = 'source-over';

        // 6. Composite Render on Main Canvas with Chromatic Fringe Edge Effect
        ctx.clearRect(0, 0, width, height);

        // Step A: Draw Bottom (Chrome/Revealed) Layer
        ctx.drawImage(bottomCanvas, 0, 0);

        // Step B: Mask Top (Base) Layer with Liquid Mask
        topCtx.globalCompositeOperation = 'destination-in';
        topCtx.drawImage(maskCanvas, 0, 0);
        topCtx.globalCompositeOperation = 'source-over';

        // Step C: Draw Masked Top Layer onto Main Canvas
        ctx.drawImage(topCanvas, 0, 0);

        // Step D: Subtle Chromatic Fringe Offset at Reveal Edge
        if (particles.length > 0) {
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          ctx.globalAlpha = 0.25;

          // Red Channel Shift
          ctx.drawImage(topCanvas, -2, -1);
          // Cyan/Blue Channel Shift
          ctx.drawImage(topCanvas, 2, 1);

          ctx.restore();
        }

        requestAnimationFrame(renderLoop);
      }
    })();
  </script>
</body>
</html>
